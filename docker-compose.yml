# docker-compose.yml
version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ebay_deal_finder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    environment:
      # Override DATABASE_URL so the backend reaches the postgres container by service name
      - DATABASE_URL=postgresql://user:password@postgres:5432/ebay_deal_finder
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Inside Docker, containers talk via service name, not localhost
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      # Must match API_KEY in backend/.env
      - NEXT_PUBLIC_API_KEY=change-me-to-a-strong-random-secret
    depends_on:
      - backend

volumes:
  pgdata:
