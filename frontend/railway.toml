[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildArgs = { NEXT_PUBLIC_API_URL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}/api/v1" }

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
